<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/style.css">
<title>Камилле❤️</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
background:radial-gradient(circle at 50% 30%,#ffb3c1,#ff758f);
overflow-x:hidden;
color:white;

}

/* HERO */

.hero{
width: 90%;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
}

.hero h1{
font-size:clamp(32px,5vw,60px);
max-width:900px;
line-height:1.4;
text-shadow:0 10px 40px rgba(0,0,0,.3);
}

/* PARALLAX STARS */

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.8;
animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* PETALS */

.petal{
position:fixed;
top:-10px;
width:14px;
height:14px;
background:#ff4d6d;
border-radius:50% 50% 50% 0;
transform:rotate(45deg);
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:.3;
}
}

/* LETTER */

.letter-section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
perspective:1000px;
}

.envelope{
width:320px;
height:200px;
position:relative;
cursor:pointer;
}

.top{
position:absolute;
width:90%;
height:100%;
background:#ff8fa3;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
}

.envelope.open .top{
transform:rotateX(180deg);
}

/* POP HEART */

.heart-pop{
position:absolute;
left:30%;
top:-80px;

width:110px;
height:90px;

transform:translateX(-50%) scale(0);
opacity:0;
}

/* правильная форма сердца */

.heart-pop::before,
.heart-pop::after{

content:"";
position:absolute;

width:70px;
height:110px;

background:#ff2d55;

border-radius:70px 70px 0 0;

box-shadow:0 0 40px rgba(255,80,120,0.6);

}

/* левая часть */

.heart-pop::before{

left:70px;
transform:rotate(-45deg);
transform-origin:0 100%;

}

/* правая часть */

.heart-pop::after{

left:0;
transform:rotate(45deg);
transform-origin:100% 100%;

}

/* появление */

.envelope.open .heart-pop{
animation:heartFly 2.5s forwards;
}

/* сердце вылетает */

@keyframes heartFly{

0%{
transform:translateX(-50%) translateY(0) scale(0);
opacity:0;
}

15%{
opacity:1;
}

30%{
transform:translateX(-50%) translateY(-40px) scale(1.2);
}

50%{
transform:translateX(-50%) translateY(-80px) scale(1.8);
}

70%{
transform:translateX(-50%) translateY(-110px) scale(2.4);
}

85%{
transform:translateX(-50%) translateY(-140px) scale(2.8);
}

100%{
transform:translateX(-50%) translateY(-180px) scale(3);
opacity: 1;

}


}

/* HEART PARTICLES */

.heart-particles{
position:absolute;
left:50%;
top:-20px;
pointer-events:none;
}

.particle{
position:absolute;
width:8px;
height:8px;
background:#ff4d6d;
transform:rotate(45deg);
opacity:0;
animation:particleFly 2s forwards;
}

.particle::before,
.particle::after{
content:"";
position:absolute;
width:8px;
height:8px;
background:#ff4d6d;
border-radius:50%;
}

.particle::before{
top:-4px;
}

.particle::after{
left:4px;
}

@keyframes particleFly{

0%{
transform:translate(0,0) scale(.5);
opacity:1;
}

100%{
transform:translate(var(--x),var(--y)) scale(1.4);
opacity:0;
}

}

.body{
position:absolute;
width:90%;
height:100%;
background:white;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#444;
font-size:22px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
font-weight: bold;
}

/* HEART SECTION */

.section{
    width: 100%;
height:150vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
margin-left: -20px;
}

canvas{
position:absolute;
}

/* PHOTOS HEART */

.photos{
position:absolute;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
opacity:0;
transform:scale(.6);
transition:1.5s;
}

.photos.show{
opacity:1;
transform:scale(1);
}

.photos img{
width:110px;
height:110px;
border-radius:16px;
object-fit:cover;
box-shadow:0 15px 40px rgba(0,0,0,.35);
transition:.4s;
}

.photos img:hover{
transform:scale(1.1);
}

/* FINAL */

.final{
margin-top:-750px;
text-align:center;
width: 50%;
}

.name{
font-size:clamp(24px,5vw,50px);
opacity:0;
transition:2s;
margin-top: 200px;
text-shadow:0 0 25px rgba(255,255,255,.8);
}

.text{
font-size:clamp(30px,4vw,54px);
margin-top:20px;
opacity:0;
transition:2s;
}

.show{
opacity:1;
}

/* MOBILE */

@media(max-width:600px){
body{
    width: 85%;
}
.photos{
grid-template-columns:repeat(2,0fr);
}

.photos img{
width: 100px;
height:100px;
}

.qr{
    margin-top: 1000px;
    margin-right: 120px;
}

.final{
    margin-top: -900px;
}


}

.qr{
    width: 100px;
    height: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-left: 33%;
    margin-top: -300px;

}

.qr img{
    width: 100%;
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3">
</audio>

<div class="stars" id="stars"></div>

<section class="hero">

<h1>


Сегодня особенный день. <br> 
И это маленькое путешествие для тебя. <br>
Я тебя люблю, дорогая!

</h1>

</section>

<section class="letter-section">

<div class="envelope" id="env">

<div class="top"></div>

<div class="body">
Нажми чтобы открыть 💌
</div>

<div class="heart-pop" id="heartPop"></div>

<div class="heart-particles" id="heartParticles"></div>

</div>

</section>

<section class="section">

<canvas id="canvas"></canvas>

<div class="photos" id="photos">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">


</div>

<div class="final">

<div class="name" id="name">
Мила, я сделал эту небольшую открытку для тебя.
</div>

<div class="text" id="love">

С 8 марта!
</div>

</div>



</section>
<section>
<div class="qr">
    <img src="/qr-code.svg" alt="">
</div>
</section>
<script>

/* STARS */

const stars=document.getElementById("stars")

for(let i=0;i<180;i++){

let s=document.createElement("div")
s.className="star"

s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"

stars.appendChild(s)

}

/* PETALS */

function petal(){

let p=document.createElement("div")
p.className="petal"

p.style.left=Math.random()*100+"vw"

let d=6+Math.random()*6

p.style.animationDuration=d+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),d*1000)

}

setInterval(petal,300)

/* LETTER */

document.getElementById("env").onclick=()=>{
document.getElementById("env").classList.toggle("open")
}

/* HEART PARTICLES */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=innerWidth
canvas.height=innerHeight

let particles=[]

function heart(t){

return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
}

}

for(let i=0;i<2200;i++){

let t=Math.random()*Math.PI*2

let pos=heart(t)

particles.push({

x:canvas.width/2+pos.x*20,
y:canvas.height/2+pos.y*20,
vx:(Math.random()-.5)*7,
vy:(Math.random()-.5)*7

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.fillStyle="white"
ctx.fillRect(p.x,p.y,2,2)

})

}

/* EXPLOSION */

function explode(){

let frame=0

function anim(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

ctx.fillRect(p.x,p.y,2,2)

})

frame++

if(frame<120){

requestAnimationFrame(anim)

}else{

document.getElementById("photos").classList.add("show")

setTimeout(()=>{
document.getElementById("name").classList.add("show")
},1500)

setTimeout(()=>{
document.getElementById("love").classList.add("show")
},3000)

}

}

anim()

}

const observer=new IntersectionObserver(e=>{

e.forEach(entry=>{

if(entry.isIntersecting){

draw()

setTimeout(explode,2000)

}

})

},{threshold:.4})

observer.observe(document.querySelector(".section"))

const env = document.getElementById("env")
const particlesContainer = document.getElementById("heartParticles")

env.onclick = () => {

env.classList.toggle("open")

createHeartParticles()

}

function createHeartParticles(){

for(let i=0;i<20;i++){

let p=document.createElement("div")

p.className="particle"

let x=(Math.random()-0.5)*200
let y=(Math.random()-0.5)*200

p.style.setProperty("--x",x+"px")
p.style.setProperty("--y",y+"px")

particlesContainer.appendChild(p)

setTimeout(()=>p.remove(),2000)

}

}
</script>

</body>
</html>
